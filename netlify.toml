[build]
  base = "."
  command = "npm install && npm run build"
  publish = "dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://felix-platform-backend.onrender.com/api/election-predictor/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
