[build]
  base = "."
  command = "npm install && npm run build"
  publish = "dist/public"

[[redirects]]
  from = "/api/subscription/*"
  to = "/.netlify/functions/subscription/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/custom-prediction"
  to = "/.netlify/functions/scenario/custom-prediction"
  status = 200
  force = true

[[redirects]]
  from = "/api/natural-language-analysis"
  to = "/.netlify/functions/scenario/natural-language-analysis"
  status = 200
  force = true

[[redirects]]
  from = "/api/subscriber/races/*/reanalyze"
  to = "/.netlify/functions/scenario/subscriber/races/:splat/reanalyze"
  status = 200
  force = true

[[redirects]]
  from = "/api/subscriber-profiles"
  to = "https://felix-platform-backend.onrender.com/api/subscriber-profiles"
  status = 200
  force = true

[[redirects]]
  from = "/api/subscriber-profiles/:email"
  to = "https://felix-platform-backend.onrender.com/api/subscriber-profiles/:email"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://felix-platform-backend.onrender.com/api/election-predictor/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
